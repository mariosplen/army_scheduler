name: ls_ypiresies
description: "A military scheduling application for my HQ Company. It automates the tracking of soldier availability, leaves, and shift rotations."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.16.2 <=3.0.0"


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  copy_with_extension: ^5.0.4
  dartz: ^0.10.1
  equatable: ^2.0.8

  flutter_bloc: ^9.1.1
  open_file: ^3.3.2
  file_saver: 0.2.9
  table_parser: ^1.0.1
  collection: ^1.17.1
  path_provider: ^2.1.2
  package_info_plus: ^4.2.0
  path: ^1.9.1
  flutter_window_close: ^1.2.0

dependency_overrides:
  path: ^1.9.0
  xml: ^6.3.0

dev_dependencies:
  build_runner: ^2.4.9
  copy_with_extension_gen: ^5.0.4
  flutter_lints: ^2.0.0
  rename_app: ^1.6.5
  flutter_launcher_icons: ^0.14.4


flutter:

  uses-material-design: true
  assets:
    - assets/excel.xlsx
    - assets/tasks.json
    - assets/logo.jpg
    - assets/template.xlsx

flutter_launcher_icons:
  image_path: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icon.png"
